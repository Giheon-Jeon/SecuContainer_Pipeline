name: Container Security Pipeline

on:
  push:
    branches: [ main, BE-* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: |
        cd vulnerable-app
        mvn clean package -DskipTests

    - name: Build Vulnerable Docker Image
      run: |
        cd vulnerable-app
        docker build -t vulnerable-app:latest -f Dockerfile.vulnerable .

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vulnerable-app:latest'
        format: 'json'
        output: 'trivy-results.json'
        severity: 'HIGH,CRITICAL'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Parse Scan Results and Fail Fast
      run: |
        python scripts/scan_parser.py trivy-results.json --level HIGH

    - name: Upload Scan Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-results
        path: trivy-results.json
